<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/styles.css" />
    <title>Olimpíadas News</title>
  </head>
  <body>
    <header>
      <img src="img/simbolo-das-olimpiadas.png" alt="simbolo-das-olimpiadas" />
      <h1>Olimpíadas News</h1>
      <input type="text" placeholder="Buscar..." />
    </header>
    <nav>
      <ul>
        <li>Esporte</li>
        <li>Saúde</li>
        <li>Lazer</li>
        <li>Olímpiadas</li>
        <li>Notícias</li>
      </ul>
    </nav>
  </body>
  <main>
    <form action="" method="get">
      <label for="">Manchete</label> <br />

      <input type="text" name="manchete" id="manchete" /><br />
      <br />
      <label for="imagem">Imagem</label><br />
      <input type="file" name="imagem" id="imagem" accept=".png .jpg" /><br />
      <br />
      <label for="noticia">Notícia</label><br />
      <textarea name="noticia" id="noticia" cols="30" rows="10"></textarea>
    </form>
  </main>
</html>
